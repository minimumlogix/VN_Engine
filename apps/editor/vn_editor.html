<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus VN Editor | Industry Standard</title>
    <link rel="stylesheet" href="css/editor.css">
</head>
<body>

    <div id="toolbar" class="panel">
        <div id="panel-toggle" onclick="toggleConfigPanel()">☰</div>
        <button class="btn" onclick="addNode('dialogue')">＋ DIALOGUE</button>
        <button class="btn" onclick="addNode('choice')">＋ CHOICE</button>
        <button class="btn" onclick="addNode('condition')">＋ LOGIC</button>
        <button class="btn" onclick="addNode('effect')">＋ EFFECT</button>
        <div style="flex: 1;"></div>
        <button class="btn btn-outline" onclick="exportJSON()">EXPORT JSON</button>
        <button class="btn btn-outline" onclick="document.getElementById('import-input').click()">IMPORT</button>
        <input type="file" id="import-input" style="display:none" onchange="importJSON(event)">
    </div>

    <div id="config-panel" class="panel">
        <h2>🛰️ NEXUS CONFIG</h2>
        
        <div class="config-section">
            <label>STORY TITLE</label>
            <input type="text" id="conf-title" value="NEW STORY" onchange="updateGlobalConfig()">
            
            <label>SUBTITLE</label>
            <input type="text" id="conf-subtitle" value="CHAPTER 1" onchange="updateGlobalConfig()">

            <label>THEME</label>
            <select id="conf-theme" onchange="updateGlobalConfig()">
                <option value="nasapunk.css">Nasapunk (Default)</option>
                <option value="cyberpunk.css">Cyberpunk</option>
                <option value="anime.css">Anime Classic</option>
                <option value="minimal.css">Minimal</option>
            </select>

            <label>LOAD SCREEN BG (URL)</label>
            <input type="text" id="conf-loadbg" placeholder="URL to loading image" onchange="updateGlobalConfig()">
        </div>

        <div class="section-title">INITIAL STATE (VARIABLES)</div>
        <div id="state-list" class="config-section"></div>
        <button class="btn btn-outline" style="width: 100%; margin-top: 5px; font-size: 11px;" onclick="addStateVar()">＋ ADD VARIABLE</button>

        <div class="section-title">CHARACTERS</div>
        <div id="char-list" class="config-section"></div>
        <button class="btn btn-outline" style="width: 100%; margin-top: 5px; font-size: 11px;" onclick="addCharacter()">＋ ADD CHAR</button>

        <div class="section-title">BACKGROUNDS</div>
        <div id="bg-list" class="config-section"></div>
        <button class="btn btn-outline" style="width: 100%; margin-top: 5px; font-size: 11px;" onclick="addBackground()">＋ ADD BG</button>

        <div class="section-title">CHAPTERS</div>
        <div id="chapter-list" class="config-section"></div>
        <button class="btn btn-outline" style="width: 100%; margin-top: 5px; font-size: 11px;" onclick="addChapter()">＋ ADD CHAPTER</button>
    </div>

    <div id="editor-container">
        <svg id="connections-svg"></svg>
        <div id="workspace"></div>
    </div>

    <script src="js/template.js" defer></script>
    <script src="js/editor.js" defer></script>
</body>
</html>
