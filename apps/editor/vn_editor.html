<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus VN Editor | Industry Standard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/editor.css">
    <link rel="stylesheet" href="css/nexus_rich_editor.css">
</head>
<body>

    <div id="config-panel" class="panel">
        <h2>🛰️ NEXUS CONFIG</h2>
        
        <div class="config-section">
            <label>STORY TITLE</label>
            <input type="text" id="conf-title" value="NEW STORY" onchange="updateGlobalConfig()">
            
            <label>SUBTITLE</label>
            <input type="text" id="conf-subtitle" value="CHAPTER 1" onchange="updateGlobalConfig()">

            <label>THEME</label>
            <div id="theme-dropdown-container"></div>

            <label>LOAD SCREEN BG (URL)</label>
            <input type="text" id="conf-loadbg" placeholder="URL to loading image" onchange="updateGlobalConfig()">
        </div>

        <div class="section-title">INITIAL STATE (VARIABLES)</div>
        <div id="state-list" class="config-section"></div>
        <button class="btn btn-outline" style="width: 100%; margin-top: 5px; font-size: 11px;" onclick="addStateVar()">＋ ADD VARIABLE</button>

        <div class="section-title">CHARACTERS</div>
        <div id="char-list" class="config-section"></div>
        <button class="btn btn-outline" style="width: 100%; margin-top: 5px; font-size: 11px;" onclick="addCharacter()">＋ ADD CHAR</button>

        <div class="section-title">CHAPTERS</div>
        <div id="chapter-list" class="config-section"></div>
        <button class="btn btn-outline" style="width: 100%; margin-top: 5px; font-size: 11px;" onclick="addChapter()">＋ ADD CHAPTER</button>
    </div>

    <div id="toolbar" class="panel d-flex align-items-center gap-2">
        <button id="panel-toggle" class="btn btn-sm d-flex align-items-center justify-content-center" onclick="toggleConfigPanel()" title="Toggle Config Panel">
            <i class="bi bi-list"></i>
        </button>
        <button class="btn btn-outline-accent btn-sm d-flex align-items-center justify-content-center px-2" onclick="store.undo()" title="Undo (Ctrl+Z)">
            <i class="bi bi-arrow-counterclockwise"></i>
        </button>
        <button class="btn btn-outline-accent btn-sm d-flex align-items-center justify-content-center px-2" onclick="store.redo()" title="Redo (Ctrl+Y)">
            <i class="bi bi-arrow-clockwise"></i>
        </button>
        <div class="vr mx-1"></div>
        <button class="btn btn-accent btn-sm d-flex align-items-center gap-1" onclick="addNode('dialogue')">
            <i class="bi bi-chat-right-text"></i> DIALOGUE
        </button>
        <button class="btn btn-accent btn-sm d-flex align-items-center gap-1" onclick="addNode('choice')">
            <i class="bi bi-diagram-2"></i> CHOICE
        </button>
        <button class="btn btn-accent btn-sm d-flex align-items-center gap-1" onclick="addNode('condition')">
            <i class="bi bi-cpu"></i> LOGIC
        </button>

        <div class="vr mx-1"></div>
        <button class="btn btn-outline-accent btn-sm d-flex align-items-center gap-1" onclick="exportJSON()">
            <i class="bi bi-download"></i> EXPORT
        </button>
        <button class="btn btn-outline-accent btn-sm d-flex align-items-center gap-1" onclick="document.getElementById('import-input').click()">
            <i class="bi bi-upload"></i> IMPORT
        </button>
        <button class="btn btn-outline-danger btn-sm d-flex align-items-center gap-1" onclick="clearCache()">
            <i class="bi bi-trash"></i> CLEAR CACHE
        </button>
        <button class="btn btn-outline-danger btn-sm d-flex align-items-center gap-1" onclick="clearWorkspace()">
            <i class="bi bi-x-circle"></i> CLEAR SCREEN
        </button>
        <input type="file" id="import-input" style="display:none" onchange="importJSON(event)">
    </div>

    <div id="editor-container">
        <svg id="connections-svg"></svg>
        <div id="workspace"></div>
    </div>

    <script src="js/nexus_macros.js" defer></script>
    <script src="js/nexus_colorpicker.js" defer></script>
    <script src="js/nexus_rich_editor.js" defer></script>
    <script src="js/template.js" defer></script>
    <script src="js/editor.js" defer></script>
</body>
</html>
