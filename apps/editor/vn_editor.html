<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus VN Editor | Industry Standard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;400;600;800&display=swap');

        :root {
            --accent: #00ffcc;
            --accent-dim: rgba(0, 255, 204, 0.2);
            --bg: #0a0c10;
            --panel: rgba(16, 20, 26, 0.85);
            --border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.5);
            --node-bg: #1a1f26;
            --node-header: #252b35;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        /* --- WORKSPACE --- */
        #editor-container {
            width: 100%;
            height: 100%;
            position: relative;
            background-image: 
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 40px 40px;
            cursor: grab;
        }

        #editor-container:active { cursor: grabbing; }

        #workspace {
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: 0 0;
            will-change: transform;
        }

        /* --- SVG OVERLAY --- */
        #connections-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .connection {
            fill: none;
            stroke: var(--accent);
            stroke-width: 3;
            stroke-linecap: round;
            opacity: 0.6;
            transition: opacity 0.2s;
        }

        .connection:hover {
            opacity: 1;
            stroke-width: 4;
        }

        /* --- NODES --- */
        .node {
            position: absolute;
            width: 280px;
            background: var(--node-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 10;
            padding-bottom: 10px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .node:hover {
            border-color: var(--accent-dim);
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.1);
        }

        .node.selected {
            border-color: var(--accent);
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.2);
        }

        .node-header {
            background: var(--node-header);
            padding: 10px 15px;
            border-radius: 11px 11px 0 0;
            font-weight: 700;
            font-size: 12px;
            letter-spacing: 1px;
            color: var(--accent);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: move;
        }

        .node-content {
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .node input, .node textarea, .node select {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            color: white;
            padding: 6px 10px;
            border-radius: 6px;
            font-family: inherit;
            font-size: 13px;
            width: 100%;
            outline: none;
        }

        .node input:focus, .node textarea:focus {
            border-color: var(--accent);
        }

        .node textarea {
            resize: none;
            height: 80px;
            font-size: 12px;
            line-height: 1.4;
        }

        .node label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-dim);
            margin-bottom: -4px;
            display: block;
        }

        /* --- PORTS --- */
        .port {
            width: 12px;
            height: 12px;
            background: var(--bg);
            border: 2px solid var(--accent);
            border-radius: 50%;
            position: absolute;
            cursor: crosshair;
            z-index: 20;
            transition: transform 0.2s;
        }

        .port:hover {
            transform: scale(1.3);
            background: var(--accent);
        }

        .port-in { left: -7px; top: 50%; transform: translateY(-50%); }
        .port-out { right: -7px; top: 50%; transform: translateY(-50%); }

        /* --- SIDEBARS --- */
        .panel {
            position: fixed;
            background: var(--panel);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            z-index: 100;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        #config-panel {
            top: 20px;
            left: 20px;
            width: 340px;
            bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
        }

        .config-section {
            background: rgba(0,0,0,0.2);
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        #toolbar {
            top: 20px;
            right: 20px;
            height: 60px;
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 0 20px;
        }

        .btn {
            background: var(--accent);
            color: black;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 255, 204, 0.3);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
        }

        .btn-outline:hover {
            background: var(--accent-dim);
        }

        h2 {
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--accent);
        }

        .section-title {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-dim);
            margin-top: 15px;
            padding-bottom: 5px;
            border-bottom: 1px solid var(--border);
        }

        .list-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.03);
            padding: 8px;
            border-radius: 8px;
            margin-top: 5px;
        }

        .list-item input {
            background: transparent;
            border: none;
            font-size: 12px;
            color: white;
            flex: 1;
        }

        /* --- SCROLLBAR --- */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

        /* --- CHOICE SPECIFIC --- */
        .choice-row {
            display: flex;
            gap: 5px;
            align-items: center;
            margin-top: 5px;
        }
        .choice-port {
            width: 10px;
            height: 10px;
            background: var(--accent);
            border-radius: 2px;
            cursor: crosshair;
        }

    </style>
</head>
<body>

    <div id="toolbar" class="panel">
        <button class="btn" onclick="addNode('dialogue')">＋ DIALOGUE</button>
        <button class="btn" onclick="addNode('choice')">＋ CHOICE</button>
        <button class="btn" onclick="addNode('effect')">＋ EFFECT</button>
        <div style="flex: 1;"></div>
        <button class="btn btn-outline" onclick="exportJSON()">EXPORT JSON</button>
        <button class="btn btn-outline" onclick="document.getElementById('import-input').click()">IMPORT</button>
        <input type="file" id="import-input" style="display:none" onchange="importJSON(event)">
    </div>

    <div id="config-panel" class="panel">
        <h2>🛰️ NEXUS CONFIG</h2>
        
        <div class="config-section">
            <label>STORY TITLE</label>
            <input type="text" id="conf-title" value="NEW STORY" onchange="updateGlobalConfig()">
            
            <label>SUBTITLE</label>
            <input type="text" id="conf-subtitle" value="CHAPTER 1" onchange="updateGlobalConfig()">

            <label>THEME</label>
            <select id="conf-theme" onchange="updateGlobalConfig()">
                <option value="nasapunk.css">Nasapunk (Default)</option>
                <option value="cyberpunk.css">Cyberpunk</option>
                <option value="anime.css">Anime Classic</option>
                <option value="minimal.css">Minimal</option>
            </select>

            <label>LOAD SCREEN BG (URL)</label>
            <input type="text" id="conf-loadbg" placeholder="URL to loading image" onchange="updateGlobalConfig()">
        </div>

        <div class="section-title">INITIAL STATE (VARIABLES)</div>
        <div id="state-list" class="config-section"></div>
        <button class="btn btn-outline" style="width: 100%; margin-top: 5px; font-size: 11px;" onclick="addStateVar()">＋ ADD VARIABLE</button>

        <div class="section-title">CHARACTERS</div>
        <div id="char-list" class="config-section"></div>
        <button class="btn btn-outline" style="width: 100%; margin-top: 5px; font-size: 11px;" onclick="addCharacter()">＋ ADD CHAR</button>

        <div class="section-title">BACKGROUNDS</div>
        <div id="bg-list" class="config-section"></div>
        <button class="btn btn-outline" style="width: 100%; margin-top: 5px; font-size: 11px;" onclick="addBackground()">＋ ADD BG</button>

        <div class="section-title">CHAPTERS</div>
        <div id="chapter-list" class="config-section"></div>
        <button class="btn btn-outline" style="width: 100%; margin-top: 5px; font-size: 11px;" onclick="addChapter()">＋ ADD CHAPTER</button>
    </div>

    <div id="editor-container">
        <svg id="connections-svg"></svg>
        <div id="workspace"></div>
    </div>

    <script>
        const editorContainer = document.getElementById('editor-container');
        const workspace = document.getElementById('workspace');
        const svg = document.getElementById('connections-svg');
        
        let nodes = [];
        let links = [];
        let offset = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
        let zoom = 1;
        let isDragging = false;
        let lastMousePos = { x: 0, y: 0 };
        let activeLink = null;
        let selectedNode = null;

        let globalConfig = {
            storyTitle: "NEXUS STORY",
            storySubtitle: "CHAPTER 1: INITIALIZATION",
            theme: "nasapunk.css",
            characters: {},
            backgrounds: {},
            chapterNames: {},
            chapterMusic: {},
            initialState: { sanity: 10 }
        };

        // --- NODE DEFINITIONS ---
        const NODE_TYPES = {
            dialogue: {
                title: "DIALOGUE",
                fields: [
                    { name: 'character', label: 'Character', type: 'select', options: 'chars' },
                    { name: 'spriteState', label: 'Sprite State (e.g. neutral, stern)', type: 'text' },
                    { name: 'text', label: 'Dialogue Text', type: 'textarea' },
                    { name: 'chapter', label: 'Chapter', type: 'number' },
                    { name: 'scene', label: 'Scene', type: 'number' },
                    { name: 'persistentEffect', label: 'Persistent GIF/Effect (URL)', type: 'text' },
                    { name: 'SpriteEffects', label: 'Sprite Post-Effect', type: 'select', options: ['None', 'Scanlines', 'Holo', 'Ghost', 'Glitch', 'Faded'] }
                ],
                ports: { in: true, out: true }
            },
            choice: {
                title: "CHOICE BRANCH",
                fields: [
                    { name: 'text', label: 'Prompt', type: 'text' }
                ],
                ports: { in: true, choices: true }
            },
            effect: {
                title: "SCREEN EFFECT",
                fields: [
                    { name: 'effect', label: 'Macro Effect (Body)', type: 'select', options: ['None', 'shake', 'glitch', 'flash', 'blink', 'electricuted', 'shadows', 'earthquake', 'heartbeat', 'vhs', 'drain', 'nuke', 'bloodsplatter', 'shockwave', 'hologram', 'rage'] },
                    { name: 'overlay', label: 'Overlay (Blocking)', type: 'select', options: ['None', 'GLITCH', 'ELECTROCUTED', 'NUKE', 'SHOCKWAVE', 'PORTAL'] },
                    { name: 'intensity', label: 'Intensity (1-3)', type: 'number' }
                ],
                ports: { in: true, out: true }
            }
        };

        // --- CORE ENGINE ---

        function init() {
            updateWorkspace();
            
            editorContainer.addEventListener('mousedown', startPan);
            window.addEventListener('mousemove', handleMouseMove);
            window.addEventListener('mouseup', handleMouseUp);
            editorContainer.addEventListener('wheel', handleWheel);
            
            // Initial data
            addCharacter("NARRATION", "SYSTEM");
            addBackground("1", "https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=1920");
            
            renderConfig();
            
            // Add start node
            addNode('dialogue', 100, 100);
        }

        function updateWorkspace() {
            workspace.style.transform = `translate(${offset.x}px, ${offset.y}px) scale(${zoom})`;
            renderLinks();
        }

        function startPan(e) {
            if (e.target === editorContainer || e.target === svg) {
                isDragging = true;
                lastMousePos = { x: e.clientX, y: e.clientY };
            }
        }

        function handleMouseMove(e) {
            if (isDragging) {
                const dx = e.clientX - lastMousePos.x;
                const dy = e.clientY - lastMousePos.y;
                offset.x += dx;
                offset.y += dy;
                lastMousePos = { x: e.clientX, y: e.clientY };
                updateWorkspace();
            }
            if (activeLink) {
                renderLinks(e);
            }
        }

        function handleMouseUp(e) {
            isDragging = false;
            if (activeLink) {
                const port = e.target.closest('.port');
                if (port && port.classList.contains('port-in')) {
                    const targetNodeId = port.parentElement.dataset.id;
                    createLink(activeLink.fromNode, activeLink.fromPort, targetNodeId, 'in');
                }
                activeLink = null;
                renderLinks();
            }
        }

        function handleWheel(e) {
            const delta = e.deltaY > 0 ? 0.9 : 1.1;
            zoom = Math.min(Math.max(0.2, zoom * delta), 3);
            updateWorkspace();
        }

        // --- NODE LOGIC ---

        function addNode(type, x = 0, y = 0) {
            const id = 'node_' + Date.now();
            const node = {
                id,
                type,
                x: (x - offset.x) / zoom,
                y: (y - offset.y) / zoom,
                data: {},
                choices: type === 'choice' ? [{ text: 'Option 1', target: null }] : []
            };
            
            nodes.push(node);
            renderNode(node);
        }

        function renderNode(node) {
            const typeDef = NODE_TYPES[node.type];
            const div = document.createElement('div');
            div.className = 'node';
            div.id = node.id;
            div.dataset.id = node.id;
            div.style.left = node.x + 'px';
            div.style.top = node.y + 'px';

            let fieldsHtml = '';
            typeDef.fields.forEach(f => {
                fieldsHtml += `<label>${f.label}</label>`;
                if (f.type === 'textarea') {
                    fieldsHtml += `<textarea onchange="updateNodeData('${node.id}', '${f.name}', this.value)">${node.data[f.name] || ''}</textarea>`;
                } else if (f.type === 'select') {
                    fieldsHtml += `<select onchange="updateNodeData('${node.id}', '${f.name}', this.value)">`;
                    const options = f.options === 'chars' ? Object.keys(globalConfig.characters) : f.options;
                    options.forEach(opt => {
                        const selected = node.data[f.name] === opt ? 'selected' : '';
                        fieldsHtml += `<option value="${opt}" ${selected}>${opt}</option>`;
                    });
                    fieldsHtml += `</select>`;
                } else {
                    fieldsHtml += `<input type="${f.type}" value="${node.data[f.name] || ''}" onchange="updateNodeData('${node.id}', '${f.name}', this.value)">`;
                }
            });

            if (node.type === 'choice') {
                fieldsHtml += `<div class="section-title">CHOICES</div>`;
                node.choices.forEach((c, idx) => {
                    fieldsHtml += `
                        <div class="choice-row">
                            <input type="text" value="${c.text}" onchange="updateChoice('${node.id}', ${idx}, this.value)" style="flex:1">
                            <div class="port port-choice" data-idx="${idx}" onmousedown="startLink(event, '${node.id}', 'choice_${idx}')"></div>
                        </div>
                    `;
                });
                fieldsHtml += `<button class="btn btn-outline" style="width:100%; margin-top:5px; font-size:10px;" onclick="addChoice('${node.id}')">＋ ADD CHOICE</button>`;
            }

            div.innerHTML = `
                <div class="node-header">
                    ${typeDef.title}
                    <span style="color:var(--text-dim); cursor:pointer" onclick="deleteNode('${node.id}')">✕</span>
                </div>
                <div class="node-content">${fieldsHtml}</div>
                ${typeDef.ports.in ? `<div class="port port-in"></div>` : ''}
                ${typeDef.ports.out ? `<div class="port port-out" onmousedown="startLink(event, '${node.id}', 'out')"></div>` : ''}
            `;

            // Dragging logic
            const header = div.querySelector('.node-header');
            header.onmousedown = (e) => {
                e.stopPropagation();
                selectNode(node.id);
                let startX = e.clientX;
                let startY = e.clientY;
                
                const onMouseMove = (me) => {
                    const dx = (me.clientX - startX) / zoom;
                    const dy = (me.clientY - startY) / zoom;
                    node.x += dx;
                    node.y += dy;
                    div.style.left = node.x + 'px';
                    div.style.top = node.y + 'px';
                    startX = me.clientX;
                    startY = me.clientY;
                    renderLinks();
                };
                
                const onMouseUp = () => {
                    window.removeEventListener('mousemove', onMouseMove);
                    window.removeEventListener('mouseup', onMouseUp);
                };
                
                window.addEventListener('mousemove', onMouseMove);
                window.addEventListener('mouseup', onMouseUp);
            };

            div.onclick = () => selectNode(node.id);

            workspace.appendChild(div);
        }

        function updateNodeData(nodeId, field, value) {
            const node = nodes.find(n => n.id === nodeId);
            node.data[field] = value;
        }

        function deleteNode(id) {
            nodes = nodes.filter(n => n.id !== id);
            links = links.filter(l => l.fromNode !== id && l.toNode !== id);
            const el = document.getElementById(id);
            if (el) el.remove();
            renderLinks();
        }

        function selectNode(id) {
            if (selectedNode) {
                const prev = document.getElementById(selectedNode);
                if (prev) prev.classList.remove('selected');
            }
            selectedNode = id;
            document.getElementById(id).classList.add('selected');
        }

        // --- LINK LOGIC ---

        function startLink(e, nodeId, portType) {
            e.stopPropagation();
            activeLink = { fromNode: nodeId, fromPort: portType };
        }

        function createLink(fromNode, fromPort, toNode, toPort) {
            // Remove existing link from this port
            links = links.filter(l => !(l.fromNode === fromNode && l.fromPort === fromPort));
            links.push({ fromNode, fromPort, toNode, toPort });
            renderLinks();
        }

        function renderLinks(mouseEvent = null) {
            svg.innerHTML = '';
            links.forEach(link => {
                const fromPos = getPortPos(link.fromNode, link.fromPort);
                const toPos = getPortPos(link.toNode, link.toPort);
                if (fromPos && toPos) drawLink(fromPos, toPos);
            });

            if (activeLink && mouseEvent) {
                const fromPos = getPortPos(activeLink.fromNode, activeLink.fromPort);
                const toPos = { x: mouseEvent.clientX, y: mouseEvent.clientY };
                drawLink(fromPos, toPos);
            }
        }

        function getPortPos(nodeId, portId) {
            const nodeEl = document.getElementById(nodeId);
            if (!nodeEl) return null;
            
            let portEl;
            if (portId === 'in') portEl = nodeEl.querySelector('.port-in');
            else if (portId === 'out') portEl = nodeEl.querySelector('.port-out');
            else if (portId.startsWith('choice_')) {
                const idx = portId.split('_')[1];
                portEl = nodeEl.querySelectorAll('.port-choice')[idx];
            }

            if (!portEl) return null;
            const rect = portEl.getBoundingClientRect();
            return { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
        }

        function drawLink(start, end) {
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            const dx = Math.abs(end.x - start.x) * 0.5;
            const d = `M ${start.x} ${start.y} C ${start.x + dx} ${start.y} ${end.x - dx} ${end.y} ${end.x} ${end.y}`;
            path.setAttribute("d", d);
            path.setAttribute("class", "connection");
            svg.appendChild(path);
        }

        // --- CHOICE LOGIC ---

        function addChoice(nodeId) {
            const node = nodes.find(n => n.id === nodeId);
            node.choices.push({ text: 'New Choice', target: null });
            refreshNode(nodeId);
        }

        function updateChoice(nodeId, idx, text) {
            const node = nodes.find(n => n.id === nodeId);
            node.choices[idx].text = text;
        }

        function refreshNode(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
            renderNode(nodes.find(n => n.id === id));
            renderLinks();
        }

        // --- GLOBAL CONFIG LOGIC ---

        function addCharacter(id = "NEW_CHAR", name = "New Character") {
            globalConfig.characters[id] = { name, sprites: { neutral: "" }, position: "left" };
            renderConfig();
            refreshAllNodes(); // Update character selects
        }

        function addBackground(id = "1", url = "") {
            globalConfig.backgrounds[id] = url;
            renderConfig();
        }

        function addCharacter() {
            const id = "NEW_CHAR_" + Object.keys(globalConfig.characters).length;
            globalConfig.characters[id] = {
                name: "New Character",
                sprite: "",
                sprites: { neutral: "" },
                position: "center",
                sfx: "",
                description: ""
            };
            renderConfig();
        }

        function deleteCharacter(id) {
            delete globalConfig.characters[id];
            renderConfig();
        }

        function updateCharacter(id, field, value) {
            if (field === 'id') {
                const char = globalConfig.characters[id];
                delete globalConfig.characters[id];
                globalConfig.characters[value] = char;
                id = value;
            } else {
                globalConfig.characters[id][field] = value;
            }
            renderConfig();
        }

        function editSprites(id) {
            const char = globalConfig.characters[id];
            let spriteHtml = '';
            Object.entries(char.sprites || {}).forEach(([key, url]) => {
                spriteHtml += `
                    <div class="list-item" style="margin-bottom: 5px;">
                        <input value="${key}" style="width:70px" onchange="const v=globalConfig.characters['${id}'].sprites['${key}']; delete globalConfig.characters['${id}'].sprites['${key}']; globalConfig.characters['${id}'].sprites[this.value]=v; editSprites('${id}')">
                        <input value="${url}" placeholder="Sprite URL" style="flex:1" onchange="globalConfig.characters['${id}'].sprites['${key}'] = this.value">
                        <span style="cursor:pointer" onclick="delete globalConfig.characters['${id}'].sprites['${key}']; editSprites('${id}')">✕</span>
                    </div>
                `;
            });

            const content = `
                <div style="padding: 10px;">
                    <h3>EXPRESSIONS: ${char.name}</h3>
                    <div id="sprites-editor">${spriteHtml}</div>
                    <button class="btn btn-outline" style="width:100%; margin-top:10px;" onclick="globalConfig.characters['${id}'].sprites['new_expr'] = ''; editSprites('${id}')">＋ ADD EXPRESSION</button>
                    <button class="btn" style="width:100%; margin-top:20px;" onclick="hideOverlay(); renderConfig()">DONE</button>
                </div>
            `;
            
            showModal(content);
        }

        function showModal(html) {
            let modal = document.getElementById('nexus-modal');
            if (!modal) {
                modal = document.createElement('div');
                modal.id = 'nexus-modal';
                modal.style = "position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:flex; align-items:center; justify-content:center; z-index:10000; backdrop-filter:blur(5px);";
                document.body.appendChild(modal);
            }
            modal.innerHTML = `
                <div style="background:#1a1a2e; border:1px solid var(--accent); padding:20px; border-radius:15px; width:400px; box-shadow: 0 0 30px var(--accent-glow);">
                    ${html}
                </div>
            `;
            modal.style.display = 'flex';
        }

        function hideOverlay() {
            const modal = document.getElementById('nexus-modal');
            if (modal) modal.style.display = 'none';
        }

        function addChapter() {
            const id = Object.keys(globalConfig.chapterNames).length + 1;
            globalConfig.chapterNames[id] = "New Chapter";
            globalConfig.chapterBackgrounds[id] = "";
            globalConfig.chapterMusic[id] = "";
            renderConfig();
        }

        function deleteChapter(id) {
            delete globalConfig.chapterNames[id];
            delete globalConfig.chapterBackgrounds[id];
            delete globalConfig.chapterMusic[id];
            renderConfig();
        }

        function updateChapter(oldId, newId, field, value) {
            if (field === 'id') {
                const name = globalConfig.chapterNames[oldId];
                const bg = globalConfig.chapterBackgrounds[oldId];
                const mus = globalConfig.chapterMusic[oldId];
                
                delete globalConfig.chapterNames[oldId];
                delete globalConfig.chapterBackgrounds[oldId];
                delete globalConfig.chapterMusic[oldId];

                globalConfig.chapterNames[newId] = name;
                globalConfig.chapterBackgrounds[newId] = bg;
                globalConfig.chapterMusic[newId] = mus;
            } else if (field === 'name') {
                globalConfig.chapterNames[oldId] = value;
            } else if (field === 'bg') {
                globalConfig.chapterBackgrounds[oldId] = value;
            } else if (field === 'music') {
                globalConfig.chapterMusic[oldId] = value;
            }
            renderConfig();
        }

        function addStateVar(key = "new_var", val = 0) {
            globalConfig.initialState[key] = val;
            renderConfig();
        }

        function deleteStateVar(key) {
            delete globalConfig.initialState[key];
            renderConfig();
        }

        function updateGlobalConfig() {
            globalConfig.storyTitle = document.getElementById('conf-title').value;
            globalConfig.storySubtitle = document.getElementById('conf-subtitle').value;
            globalConfig.theme = document.getElementById('conf-theme').value;
            globalConfig.loadScreenBackground = document.getElementById('conf-loadbg').value;
        }

        function renderConfig() {
            // Title & Basics
            document.getElementById('conf-title').value = globalConfig.storyTitle;
            document.getElementById('conf-subtitle').value = globalConfig.storySubtitle;
            document.getElementById('conf-theme').value = globalConfig.theme || 'nasapunk.css';
            document.getElementById('conf-loadbg').value = globalConfig.loadScreenBackground || '';

            const stateList = document.getElementById('state-list');
            stateList.innerHTML = '';
            Object.entries(globalConfig.initialState).forEach(([key, val]) => {
                const div = document.createElement('div');
                div.className = 'list-item';
                div.innerHTML = `
                    <input value="${key}" style="width:70px" onchange="const v=globalConfig.initialState['${key}']; delete globalConfig.initialState['${key}']; globalConfig.initialState[this.value]=v; renderConfig()">
                    <input type="number" value="${val}" style="width:40px" onchange="globalConfig.initialState['${key}'] = parseInt(this.value)">
                    <span style="cursor:pointer" onclick="deleteStateVar('${key}')">✕</span>
                `;
                stateList.appendChild(div);
            });

            const chapterList = document.getElementById('chapter-list');
            chapterList.innerHTML = '';
            Object.entries(globalConfig.chapterNames).forEach(([id, name]) => {
                const bg = globalConfig.chapterBackgrounds[id] || "";
                const music = globalConfig.chapterMusic[id] || "";
                const div = document.createElement('div');
                div.className = 'list-item';
                div.style.flexDirection = 'column';
                div.style.alignItems = 'stretch';
                div.style.gap = '5px';
                div.innerHTML = `
                    <div style="display:flex; gap:5px; align-items:center">
                        <input type="number" value="${id}" style="width:50px; font-weight:bold; color:var(--accent)" onchange="updateChapter('${id}', this.value, 'id')">
                        <input value="${name}" placeholder="Chapter Title" style="flex:1" onchange="updateChapter('${id}', null, 'name', this.value)">
                        <span style="cursor:pointer" onclick="deleteChapter('${id}')">✕</span>
                    </div>
                    <input value="${bg}" placeholder="Background URL" style="font-size:10px" onchange="updateChapter('${id}', null, 'bg', this.value)">
                    <input value="${music}" placeholder="Music URL (MP3/YT)" style="font-size:10px" onchange="updateChapter('${id}', null, 'music', this.value)">
                `;
                chapterList.appendChild(div);
            });

            const charList = document.getElementById('char-list');
            charList.innerHTML = '';
            Object.entries(globalConfig.characters).forEach(([id, c]) => {
                const div = document.createElement('div');
                div.className = 'list-item';
                div.style.flexDirection = 'column';
                div.style.alignItems = 'stretch';
                div.style.gap = '5px';
                div.innerHTML = `
                    <div style="display:flex; gap:5px; align-items:center">
                        <input value="${id}" style="width:80px; font-weight:bold; color:var(--accent)" onchange="updateCharacter('${id}', 'id', this.value)">
                        <input value="${c.name || ''}" placeholder="Display Name" style="flex:1" onchange="updateCharacter('${id}', 'name', this.value)">
                        <span style="cursor:pointer" onclick="deleteCharacter('${id}')">✕</span>
                    </div>
                    <div style="display:flex; gap:5px;">
                        <select style="flex:1" onchange="updateCharacter('${id}', 'position', this.value)">
                            <option value="left" ${c.position === 'left' ? 'selected' : ''}>Left</option>
                            <option value="center" ${c.position === 'center' ? 'selected' : ''}>Center</option>
                            <option value="right" ${c.position === 'right' ? 'selected' : ''}>Right</option>
                        </select>
                        <button class="btn btn-outline" style="padding:2px 8px; font-size:10px" onclick="editSprites('${id}')">🎭 SPRITES</button>
                    </div>
                    <input value="${c.sfx || ''}" placeholder="Voice SFX URL" onchange="updateCharacter('${id}', 'sfx', this.value)">
                    <textarea placeholder="Description (optional)" style="height:40px; font-size:10px" onchange="updateCharacter('${id}', 'description', this.value)">${c.description || ''}</textarea>
                `;
                charList.appendChild(div);
            });

            const bgList = document.getElementById('bg-list');
            bgList.innerHTML = '';
            Object.entries(globalConfig.backgrounds).forEach(([id, url]) => {
                const div = document.createElement('div');
                div.className = 'list-item';
                div.innerHTML = `
                    <input value="${id}" style="width:40px" onchange="renameBg('${id}', this.value)">
                    <input value="${url}" placeholder="URL" onchange="globalConfig.backgrounds['${id}'] = this.value">
                    <span style="cursor:pointer" onclick="deleteBg('${id}')">✕</span>
                `;
                bgList.appendChild(div);
            });
        }

        function refreshAllNodes() {
            nodes.forEach(n => refreshNode(n.id));
        }

        // --- EXPORT / IMPORT ---

        function exportJSON() {
            const dialogue = [];
            
            // Map graph nodes to array indices
            const nodeIdToIndex = {};
            nodes.forEach((n, i) => nodeIdToIndex[n.id] = i);

            nodes.forEach((node, index) => {
                const charName = node.data.character || "NARRATION";
                const spriteState = node.data.spriteState ? `:${node.data.spriteState}` : "";
                
                const entry = {
                    id: node.id,
                    chapter: parseInt(node.data.chapter) || 0,
                    scene: parseInt(node.data.scene) || 1,
                    character: charName + spriteState,
                    text: node.data.text || ""
                };

                if (node.data.SpriteEffects && node.data.SpriteEffects !== 'None') entry.SpriteEffects = node.data.SpriteEffects;
                if (node.data.persistentEffect) entry.persistentEffect = node.data.persistentEffect;

                if (node.type === 'effect') {
                    if (node.data.effect && node.data.effect !== 'None') {
                        const intensity = node.data.intensity ? `(${node.data.intensity})` : "";
                        entry.text = `[${node.data.effect}${intensity}] ${entry.text}`;
                    }
                    if (node.data.overlay && node.data.overlay !== 'None') {
                        entry.text = `[${node.data.overlay}] ${entry.text}`;
                    }
                }

                // Handle out link
                const outLink = links.find(l => l.fromNode === node.id && l.fromPort === 'out');
                if (outLink) {
                    entry.nextId = outLink.toNode;
                }

                // Handle choices
                if (node.type === 'choice') {
                    entry.choices = node.choices.map((c, idx) => {
                        const link = links.find(l => l.fromNode === node.id && l.fromPort === `choice_${idx}`);
                        return {
                            text: c.text,
                            nextId: link ? link.toNode : null
                        };
                    });
                }

                dialogue.push(entry);
            });

            const output = {
                ...globalConfig,
                storyDialogue: dialogue
            };

            const blob = new Blob([JSON.stringify(output, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'story.json';
            a.click();
        }

        function importJSON(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (re) => {
                const data = JSON.parse(re.target.result);
                nodes = [];
                links = [];
                workspace.innerHTML = '';
                
                // Load global config
                globalConfig = { ...globalConfig, ...data };
                delete globalConfig.storyDialogue;
                renderConfig();

                // Load nodes
                data.storyDialogue.forEach((d, i) => {
                    const node = {
                        id: d.id || `node_${i}`,
                        type: d.choices ? 'choice' : 'dialogue',
                        x: 100 + (i % 5) * 300,
                        y: 100 + Math.floor(i / 5) * 350,
                        data: {
                            character: d.character,
                            text: d.text,
                            chapter: d.chapter,
                            scene: d.scene
                        },
                        choices: d.choices || []
                    };
                    nodes.push(node);
                    renderNode(node);
                });

                // Re-create links
                data.storyDialogue.forEach((d, i) => {
                    const fromId = d.id || `node_${i}`;
                    if (d.nextId) {
                        links.push({ fromNode: fromId, fromPort: 'out', toNode: d.nextId, toPort: 'in' });
                    }
                    if (d.choices) {
                        d.choices.forEach((c, cIdx) => {
                            if (c.nextId) {
                                links.push({ fromNode: fromId, fromPort: `choice_${cIdx}`, toNode: c.nextId, toPort: 'in' });
                            }
                        });
                    }
                });

                renderLinks();
            };
            reader.readAsText(file);
        }

        init();

    </script>
</body>
