<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src * 'self' 'unsafe-inline' 'unsafe-eval' data: gap: content: blob:;">
    <title>Premium Music Control</title>
    <!-- Premium Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff3366;
            --secondary: #00f2ff;
            --bg-glass: rgba(10, 10, 15, 0.7);
            --border-glass: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.6);
            --glow: 0 0 20px rgba(255, 51, 102, 0.4);
            --height: 80px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-drag: none;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: transparent;
            overflow: hidden;
            height: var(--height);
        }

        /* --- Main Container --- */
        #player-container {
            position: relative;
            width: 100%;
            height: var(--height);
            background: var(--bg-glass);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-top: 1px solid var(--border-glass);
            display: flex;
            align-items: center;
            padding: 0 20px;
            overflow: hidden;
            transition: var(--transition);
        }

        #album-art-bg {
            position: absolute;
            inset: -20px;
            background-size: cover;
            background-position: center;
            filter: blur(40px) brightness(0.4);
            z-index: -1;
            transition: background-image 1s ease;
            animation: slowPan 20s infinite alternate linear;
        }

        @keyframes slowPan {
            from { transform: scale(1.1) translateX(-5%); }
            to { transform: scale(1.2) translateX(5%); }
        }

        /* --- Adaptive Layout Modes --- */
        .mode-nano { padding: 0 10px !important; justify-content: center !important; }
        .mode-compact { padding: 0 15px !important; }

        /* --- Track Info --- */
        .track-info {
            display: flex;
            align-items: center;
            gap: 15px;
            min-width: 0;
            flex: 1;
        }

        .mode-nano .track-info, .mode-nano .controls-side, .mode-nano .volume-section { display: none; }
        .mode-compact .volume-section { display: none; }

        .album-art-mini {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            background-size: cover;
            background-position: center;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            flex-shrink: 0;
        }

        .meta {
            min-width: 0;
            overflow: hidden;
        }

        .title {
            font-weight: 700;
            font-size: 14px;
            color: var(--text-main);
            white-space: nowrap;
            display: block;
        }

        .artist {
            font-size: 12px;
            color: var(--text-dim);
            white-space: nowrap;
        }

        /* Scrolling Marquee if text is too long */
        .marquee {
            animation: marquee 10s linear infinite;
        }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* --- Central Controls --- */
        .controls-main {
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 10;
        }

        .btn {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .btn:hover:not(:disabled) {
            color: var(--text-main);
            transform: scale(1.1);
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.3));
        }

        .btn:active { transform: scale(0.9); }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .btn-play {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--primary), #ff6b6b);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 51, 102, 0.4);
        }

        .btn-play:hover {
            transform: scale(1.1) translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 51, 102, 0.6);
            color: white;
        }

        .btn.active { color: var(--primary); text-shadow: var(--glow); }

        /* --- Side Sections --- */
        .controls-side {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-left: 15px;
        }

        .volume-section {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 140px;
            justify-content: flex-end;
        }

        /* --- Sliders (Progress & Volume) --- */
        .slider-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.1);
            cursor: pointer;
            transition: height 0.2s ease;
        }

        .slider-container:hover { height: 8px; }

        .slider-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            position: relative;
            box-shadow: 0 0 10px var(--primary);
            transition: width 0.1s linear;
        }

        .slider-fill::after {
            content: '';
            position: absolute;
            right: -4px;
            top: 50%;
            transform: translateY(-50%);
            width: 12px;
            height: 12px;
            background: white;
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.2s;
            box-shadow: 0 0 10px rgba(255,255,255,0.8);
        }

        .slider-container:hover .slider-fill::after { opacity: 1; }

        /* Volume Slider Specific */
        .vol-slider {
            width: 80px;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            position: relative;
            cursor: pointer;
        }
        .vol-fill {
            height: 100%;
            width: 100%;
            background: var(--text-main);
            border-radius: 2px;
            transition: width 0.1s;
        }

        /* --- Visualizer --- */
        .visualizer {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            height: 20px;
            margin-left: 10px;
        }

        .viz-bar {
            width: 3px;
            height: 20%;
            background: var(--secondary);
            border-radius: 1px;
            transition: height 0.2s ease;
        }

        .playing .viz-bar {
            animation: equalize 1s infinite alternate;
        }

        @keyframes equalize {
            0% { height: 20%; }
            50% { height: 100%; }
            100% { height: 40%; }
        }

        .viz-bar:nth-child(2) { animation-delay: 0.1s; }
        .viz-bar:nth-child(3) { animation-delay: 0.2s; }
        .viz-bar:nth-child(4) { animation-delay: 0.3s; }

        /* --- Player Hide --- */
        #player { position: absolute; top: -9999px; }

        /* --- Tooltip --- */
        [title]:hover::after {
            content: attr(title);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%) translateY(-10px);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            white-space: nowrap;
            pointer-events: none;
            z-index: 100;
        }
    </style>
</head>
<body class="no-select">

    <div id="player-container">
        <div id="album-art-bg"></div>

        <!-- Track Info -->
        <div class="track-info">
            <div id="album-art-mini" class="album-art-mini"></div>
            <div class="meta">
                <div id="track-title-container">
                    <span id="track-title" class="title">Loading...</span>
                </div>
                <div id="track-artist" class="artist">Please wait</div>
            </div>
            <!-- Visualizer -->
            <div id="visualizer" class="visualizer">
                <div class="viz-bar"></div>
                <div class="viz-bar"></div>
                <div class="viz-bar"></div>
                <div class="viz-bar"></div>
            </div>
        </div>

        <!-- Central Controls -->
        <div class="controls-main">
            <button id="shuffle-btn" class="btn" title="Shuffle">
                <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M16 3h5v5M4 21L21 4M21 16v5h-5M4 3l7 7"/></svg>
            </button>
            <button id="prev-btn" class="btn" title="Previous" disabled>
                <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
            </button>
            <button id="play-pause-btn" class="btn btn-play" title="Play/Pause" disabled>
                <svg id="play-icon" width="28" height="28" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                <svg id="pause-icon" class="hidden" width="28" height="28" fill="currentColor" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
            <button id="next-btn" class="btn" title="Next" disabled>
                <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
            </button>
            <button id="repeat-btn" class="btn" title="Repeat">
                <svg id="repeat-icon" width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
            </button>
        </div>

        <!-- Side Controls (Extra) -->
        <div class="controls-side">
            <button id="open-video-btn" class="btn" title="Watch Video" disabled>
                <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M19 19H5V5h7V3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z"/></svg>
            </button>
        </div>

        <!-- Volume Section -->
        <div class="volume-section">
            <button id="volume-btn" class="btn">
                <svg id="vol-high" width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
            </button>
            <div id="vol-container" class="vol-slider">
                <div id="vol-fill" class="vol-fill"></div>
            </div>
        </div>

        <!-- Progress Bar -->
        <div id="progress-container" class="slider-container">
            <div id="progress-fill" class="slider-fill"></div>
        </div>
    </div>

    <div id="player"></div>

    <script>
        const FALLBACK_VIDEO_ID = 'OyFcQ909OYc';
        
        const els = {
            container: document.getElementById('player-container'),
            playPauseBtn: document.getElementById('play-pause-btn'),
            playIcon: document.getElementById('play-icon'),
            pauseIcon: document.getElementById('pause-icon'),
            nextBtn: document.getElementById('next-btn'),
            prevBtn: document.getElementById('prev-btn'),
            shuffleBtn: document.getElementById('shuffle-btn'),
            repeatBtn: document.getElementById('repeat-btn'),
            openVideoBtn: document.getElementById('open-video-btn'),
            progressFill: document.getElementById('progress-fill'),
            progressContainer: document.getElementById('progress-container'),
            albumArtBg: document.getElementById('album-art-bg'),
            albumArtMini: document.getElementById('album-art-mini'),
            title: document.getElementById('track-title'),
            artist: document.getElementById('track-artist'),
            volumeBtn: document.getElementById('volume-btn'),
            volFill: document.getElementById('vol-fill'),
            volContainer: document.getElementById('vol-container'),
            visualizer: document.getElementById('visualizer')
        };

        let player;
        let isPlaylistMode = false;
        let repeatMode = 'none'; // 'none', 'all', 'one'
        let isShuffle = false;
        let lastVolume = 100;
        let progressInterval;

        // --- YouTube API ---
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.appendChild(tag);

        function onYouTubeIframeAPIReady() {
            const listId = getParam('list');
            const videoId = getParam('videoId') || (listId ? '' : FALLBACK_VIDEO_ID);
            
            const playerVars = { 'autoplay': 1, 'controls': 0, 'disablekb': 1, 'modestbranding': 1, 'rel': 0 };
            if (listId) { 
                isPlaylistMode = true; 
                playerVars.listType = 'playlist'; 
                playerVars.list = listId; 
            }

            player = new YT.Player('player', {
                height: '1', width: '1', playerVars: playerVars,
                events: { 
                    'onReady': onPlayerReady, 
                    'onStateChange': onPlayerStateChange,
                    'onError': () => nextTrack()
                }
            });
        }

        function onPlayerReady() {
            updateVolumeUI(player.getVolume());
            updateControlStates();
            checkLayout();
        }

        function onPlayerStateChange(e) {
            const isPlaying = e.data === YT.PlayerState.PLAYING;
            els.playIcon.style.display = isPlaying ? 'none' : 'block';
            els.pauseIcon.style.display = isPlaying ? 'block' : 'none';
            els.visualizer.classList.toggle('playing', isPlaying);

            if (isPlaying) {
                const data = player.getVideoData();
                updateMeta(data);
                startProgress();
            } else {
                stopProgress();
            }

            if (e.data === YT.PlayerState.ENDED) {
                if (repeatMode === 'one') { player.playVideo(); }
                else { nextTrack(); }
            }
        }

        function updateMeta(data) {
            if (!data) return;
            els.title.textContent = data.title;
            els.artist.textContent = data.author;
            const thumb = `https://i.ytimg.com/vi/${data.video_id}/mqdefault.jpg`;
            els.albumArtBg.style.backgroundImage = `url(${thumb})`;
            els.albumArtMini.style.backgroundImage = `url(${thumb})`;
            
            // Check for title overflow
            const containerWidth = document.getElementById('track-title-container').offsetWidth;
            if (els.title.scrollWidth > containerWidth) {
                els.title.classList.add('marquee');
                els.title.innerHTML = `<span>${data.title}</span><span>${data.title}</span>`;
            } else {
                els.title.classList.remove('marquee');
                els.title.innerHTML = data.title;
            }
        }

        function startProgress() {
            stopProgress();
            progressInterval = setInterval(() => {
                const cur = player.getCurrentTime();
                const dur = player.getDuration();
                if (dur > 0) els.progressFill.style.width = `${(cur / dur) * 100}%`;
            }, 500);
        }
        function stopProgress() { clearInterval(progressInterval); }

        function nextTrack() { isPlaylistMode ? player.nextVideo() : player.stopVideo(); }
        function prevTrack() { player.getCurrentTime() > 3 ? player.seekTo(0) : (isPlaylistMode ? player.previousVideo() : player.seekTo(0)); }

        function updateVolumeUI(v) {
            els.volFill.style.width = `${v}%`;
            player.setVolume(v);
        }

        function updateControlStates() {
            const active = isPlaylistMode || player.getVideoData().video_id;
            els.playPauseBtn.disabled = !active;
            els.nextBtn.disabled = !active;
            els.prevBtn.disabled = !active;
            els.openVideoBtn.disabled = !active;
        }

        // --- Interaction ---
        els.playPauseBtn.onclick = () => player.getPlayerState() === 1 ? player.pauseVideo() : player.playVideo();
        els.nextBtn.onclick = nextTrack;
        els.prevBtn.onclick = prevTrack;
        
        els.shuffleBtn.onclick = () => {
            isShuffle = !isShuffle;
            els.shuffleBtn.classList.toggle('active', isShuffle);
            if (isPlaylistMode) player.setShuffle(isShuffle);
        };

        els.repeatBtn.onclick = () => {
            if (repeatMode === 'none') repeatMode = 'all';
            else if (repeatMode === 'all') repeatMode = 'one';
            else repeatMode = 'none';
            
            els.repeatBtn.classList.toggle('active', repeatMode !== 'none');
            // Simplified: Repeat one handled in onPlayerStateChange
        };

        els.volumeBtn.onclick = () => {
            if (player.getVolume() > 0) {
                lastVolume = player.getVolume();
                updateVolumeUI(0);
            } else {
                updateVolumeUI(lastVolume);
            }
        };

        els.openVideoBtn.onclick = () => {
            const id = player.getVideoData().video_id;
            if (id) window.open(`https://www.youtube.com/watch?v=${id}`, '_blank');
        };

        // --- Sliders ---
        function setupSlider(container, fill, callback) {
            let isDragging = false;
            const handle = (e) => {
                const rect = container.getBoundingClientRect();
                let p = (e.clientX - rect.left) / rect.width;
                p = Math.max(0, Math.min(1, p));
                fill.style.width = `${p * 100}%`;
                callback(p);
            };
            container.onmousedown = (e) => { isDragging = true; handle(e); };
            window.addEventListener('mousemove', (e) => { if (isDragging) handle(e); });
            window.addEventListener('mouseup', () => { isDragging = false; });
        }

        setupSlider(els.progressContainer, els.progressFill, (p) => player.seekTo(player.getDuration() * p));
        setupSlider(els.volContainer, els.volFill, (p) => updateVolumeUI(p * 100));

        // --- Layout Engine ---
        function checkLayout() {
            const w = window.innerWidth;
            els.container.classList.remove('mode-nano', 'mode-compact');
            
            if (w < 150) {
                els.container.classList.add('mode-nano');
            } else if (w < 450) {
                els.container.classList.add('mode-compact');
            }
        }

        window.onresize = checkLayout;
        const getParam = (n) => new URLSearchParams(window.location.search).get(n);

    </script>
</body>
</html>
