<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src * 'self' 'unsafe-inline' 'unsafe-eval' data: gap: content: border-radius:; font-src * data:; style-src * 'unsafe-inline';">
    <title>YouTube Music Control Bar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        
        :root {
            --accent: #EF4444;
            --accent-glow: rgba(239, 68, 68, 0.4);
            --glass-bg: rgba(0, 0, 0, 0.15); 
            --glass-border: rgba(255, 255, 255, 0.08);
            --transition-smooth: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        body { font-family: 'Inter', sans-serif; background: transparent; margin: 0; overflow: hidden; }
        .no-select { -webkit-user-select: none; -ms-user-select: none; user-select: none; }

        /* --- Core Layout --- */
        #control-bar { 
            position: fixed;
            top: 0; 
            left: 0;
            width: 100%;
            height: 80px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border-bottom: 1px solid var(--glass-border);
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.5rem;
            transition: var(--transition-smooth);
        }

        #album-art-bg { 
            position: absolute; 
            inset: 0; 
            background-size: cover; 
            background-position: center; 
            transition: background-image 1.5s ease; 
            filter: blur(40px) brightness(0.2); 
            transform: scale(1.1); 
            z-index: -1; 
            animation: atmosphericDrift 30s infinite alternate ease-in-out; 
        }
        @keyframes atmosphericDrift { 
            0% { transform: scale(1.1) translate(0, 0); } 
            100% { transform: scale(1.2) translate(-1%, -1%); } 
        }

        /* --- Progress Bar (Pinned to Bottom) --- */
        .progress-bar-container { 
            position: absolute; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            height: 3px; 
            background-color: rgba(255,255,255,0.1); 
            cursor: pointer; 
            transition: height 0.3s ease; 
            z-index: 60;
        }
        .progress-bar-container:hover { height: 6px; }
        .progress-bar { 
            height: 100%; 
            background: linear-gradient(90deg, #F87171, #EF4444, #F43F5E); 
            transition: width 0.1s linear; 
            position: relative;
        }

        /* --- Credits --- */
        .credits-container {
            position: absolute;
            bottom: 6px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            pointer-events: none;
            z-index: 55;
        }
        .credits-text {
            font-size: 8px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.3);
            font-weight: 600;
        }

        /* --- Controls & UI --- */
        .control-btn { 
            color: rgba(255,255,255,0.6); 
            transition: var(--transition-smooth); 
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .control-btn:hover:not(:disabled) { color: #fff; transform: scale(1.1); }
        .control-btn:disabled { opacity: 0.2; cursor: not-allowed; }
        .control-btn.active { color: var(--accent); filter: drop-shadow(0 0 8px var(--accent-glow)); }

        .play-pause-btn {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            transition: var(--transition-smooth);
        }
        .play-pause-btn:hover:not(:disabled) { background: rgba(255, 255, 255, 0.15); border-color: rgba(255, 255, 255, 0.2); }

        /* --- Horizontal Volume Popup (Inside Bar) --- */
        .volume-group {
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.05);
            border-radius: 25px;
            padding: 4px;
            transition: var(--transition-smooth);
            overflow: hidden;
            width: 40px; /* Icon width only initially */
            max-width: 40px;
            border: 1px solid transparent;
        }
        .volume-group:hover, .volume-group.active {
            width: 160px;
            max-width: 160px;
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.1);
            padding: 4px 12px;
        }
        .volume-slider-wrapper {
            flex: 1;
            margin-left: 10px;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            height: 4px;
            display: flex;
            align-items: center;
        }
        .volume-group:hover .volume-slider-wrapper,
        .volume-group.active .volume-slider-wrapper {
            opacity: 1;
            visibility: visible;
        }
        #volume-slider-track {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.15);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }
        #volume-slider-fill {
            height: 100%;
            background: #fff;
            border-radius: 2px;
            width: 100%;
            position: relative;
        }
        #volume-slider-fill::after {
            content: '';
            position: absolute;
            right: -6px;
            top: 50%;
            transform: translateY(-50%);
            width: 12px;
            height: 12px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(0,0,0,0.4);
        }

        /* --- Track Info --- */
        .track-info {
            display: flex;
            flex-direction: column;
            max-width: 280px;
        }
        #track-title { font-weight: 700; font-size: 0.9rem; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        #track-artist { font-size: 0.75rem; color: rgba(255,255,255,0.5); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        @media (max-width: 640px) {
            .track-info { display: none; }
            #control-bar { padding: 0 0.75rem; justify-content: center; gap: 1rem; }
            .volume-group:hover { width: 140px; }
        }
    </style>
</head>
<body class="no-select">

    <div id="control-bar">
        <div id="album-art-bg"></div>

        <!-- Progress Bar (Pinned to Bottom Edge) -->
        <div id="progress-bar-container" class="progress-bar-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>

        <!-- Credits (Inside Bar, Above Progress) -->
        <div class="credits-container">
            <span class="credits-text">Music Player by 🅷🆄🅼🅰🅽</span>
        </div>

        <!-- Section: Track Info -->
        <div class="flex items-center flex-1 min-w-0">
            <div class="track-info">
                <p id="track-title">Loading Player...</p>
                <p id="track-artist">Please wait</p>
            </div>
        </div>

        <!-- Section: Controls -->
        <div class="flex items-center justify-center gap-6 flex-1">
            <button id="shuffle-btn" class="control-btn" title="Shuffle"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 3h5v5M4 21L21 4M21 16v5h-5M4 3l7 7"></path></svg></button>
            <button id="prev-btn" class="control-btn" title="Previous" disabled><svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M15.25 4.75a.75.75 0 00-1.5 0v10.5a.75.75 0 001.5 0V4.75zM11.873 4.41a.75.75 0 00-1.123.662v10.05c0 .542.604.889 1.123.662l-6.877-4.854a.75.75 0 000-1.324L11.873 4.41z"/></svg></button>
            
            <button id="play-pause-btn" class="play-pause-btn control-btn" title="Play" disabled>
                <span id="play-icon"><svg class="w-8 h-8" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd" /></svg></span>
                <span id="pause-icon" class="hidden"><svg class="w-8 h-8" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8 7a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1zm4 0a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" /></svg></span>
            </button>

            <button id="next-btn" class="control-btn" title="Next" disabled><svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M4.75 4.75a.75.75 0 00-1.5 0v10.5a.75.75 0 001.5 0V4.75zM8.127 4.41a.75.75 0 00-1.123.662v10.05c0 .542.604.889 1.123.662l6.877-4.854a.75.75 0 000-1.324L8.127 4.41z"/></svg></button>
            <button id="repeat-btn" class="control-btn" title="Repeat"></button>
        </div>

        <!-- Section: Volume & More -->
        <div class="flex items-center justify-end gap-6 flex-1">
            <button id="open-video-btn" class="control-btn sm:flex hidden" title="Open Video" disabled><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg></button>
            
            <div class="volume-group" id="volume-group">
                <button id="volume-icon-btn" class="control-btn" title="Mute/Unmute"></button>
                <div class="volume-slider-wrapper">
                    <div id="volume-slider-track">
                        <div id="volume-slider-fill"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="player"></div>

    <script>
        const FALLBACK_VIDEO_ID = 'OyFcQ909OYc';
        const SVG_ICONS = {
            volumeHigh: `<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M3 8h3l4-3v10l-4-3H3zM14 7a5 5 0 010 6M14 4a8 8 0 010 12"/></svg>`,
            volumeMedium: `<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M3 8h3l4-3v10l-4-3H3zM14 7a5 5 0 010 6"/></svg>`,
            volumeLow: `<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M3 8h3l4-3v10l-4-3H3z"/></svg>`,
            volumeOff: `<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M3 8h3l4-3v10l-4-3H3zM16 4l-2 2m0 0l-2 2m2-2l2 2m-2-2l-2-2"/></svg>`,
            repeatOff: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 2l4 4-4 4M3 11v-1a4 4 0 014-4h14M7 22l-4-4 4-4M21 13v1a4 4 0 01-4 4H3"></path></svg>`,
            repeatOne: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 2l4 4-4 4M3 11v-1a4 4 0 014-4h14M7 22l-4-4 4-4M21 13v1a4 4 0 01-4 4H3"></path><path d="M11.5 10.5h1V14h-1z" stroke-width="1" fill="currentColor"></path></svg>`
        };

        const els = {
            playPauseBtn: document.getElementById('play-pause-btn'),
            playIcon: document.getElementById('play-icon'),
            pauseIcon: document.getElementById('pause-icon'),
            nextBtn: document.getElementById('next-btn'),
            prevBtn: document.getElementById('prev-btn'),
            shuffleBtn: document.getElementById('shuffle-btn'),
            repeatBtn: document.getElementById('repeat-btn'),
            openVideoBtn: document.getElementById('open-video-btn'),
            progressBar: document.getElementById('progress-bar'),
            progressContainer: document.getElementById('progress-bar-container'),
            albumArt: document.getElementById('album-art-bg'),
            title: document.getElementById('track-title'),
            artist: document.getElementById('track-artist'),
            volumeBtn: document.getElementById('volume-icon-btn'),
            volumeTrack: document.getElementById('volume-slider-track'),
            volumeFill: document.getElementById('volume-slider-fill'),
            volumeGroup: document.getElementById('volume-group')
        };

        let player, playlist = [], currentTrackIndex = -1, isShuffle = false, repeatMode = 'none';
        let progressInterval, isVolumeDragging = false, isSeekDragging = false, lastVolume = 100, isPlaylistMode = false;

        const tag = document.createElement('script'); tag.src = "https://www.youtube.com/iframe_api";
        document.getElementsByTagName('script')[0].parentNode.insertBefore(tag, document.getElementsByTagName('script')[0]);

        function onYouTubeIframeAPIReady() {
            const list = getUrlParameter('list'), videoId = getUrlParameter('videoId');
            const vars = { 'autoplay': 1, 'controls': 0, 'disablekb': 1, 'modestbranding': 1, 'rel': 0 };
            if (list) { isPlaylistMode = true; vars.listType = 'playlist'; vars.list = list; }
            else if (!videoId) { }
            player = new YT.Player('player', { height: '1', width: '1', playerVars: vars, events: { 'onReady': onPlayerReady, 'onStateChange': onPlayerStateChange, 'onError': onPlayerError } });
        }

        function onPlayerStateChange(e) {
            updatePlayPauseIcon(e.data);
            if (e.data === YT.PlayerState.PLAYING) {
                const vd = player.getVideoData(); updateTrackInfo(vd); setAlbumArt(vd.video_id); startProgressUpdater();
            } else stopProgressUpdater();
            if (e.data === YT.PlayerState.ENDED && repeatMode !== 'one' && !isPlaylistMode) playNextSong();
        }

        const startProgressUpdater = () => {
            stopProgressUpdater();
            progressInterval = setInterval(() => {
                if (player && player.getCurrentTime) {
                    const ct = player.getCurrentTime(), dur = player.getDuration();
                    if (repeatMode === 'one' && dur > 0 && ct >= (dur - 0.5)) { player.seekTo(0); return; }
                    if (dur > 0) els.progressBar.style.width = `${(ct / dur) * 100}%`;
                }
            }, 100);
        };
        const stopProgressUpdater = () => clearInterval(progressInterval);

        function toggleRepeat() {
            if (repeatMode === 'none') repeatMode = 'all'; else if (repeatMode === 'all') repeatMode = 'one'; else repeatMode = 'none';
            if (isPlaylistMode && player.setLoop) player.setLoop(repeatMode === 'all');
            updateRepeatUI();
        }

        function playNextSong() {
            if (!player) return; if (isPlaylistMode) { player.nextVideo(); return; }
            let ni = isShuffle ? getNextRandomIndex() : currentTrackIndex + 1;
            if (ni >= playlist.length) { if (repeatMode === 'all') ni = 0; else { player.stopVideo(); return; } }
            loadTrack(ni);
        }

        function playPrevSong() {
            if (!player) return; if (isPlaylistMode) { player.previousVideo(); return; }
            if (player.getCurrentTime() > 3) { player.seekTo(0); return; }
            let pi = currentTrackIndex - 1; if (pi < 0) pi = playlist.length - 1; loadTrack(pi);
        }

        function onPlayerReady() {
            if (!isPlaylistMode) addTrackById(getUrlParameter('videoId') || FALLBACK_VIDEO_ID, false);
            updateVolumeUI(player.getVolume()); updateRepeatUI(); updateControlStates();
        }

        function onPlayerError() {
            if (isPlaylistMode) setTimeout(() => player.nextVideo(), 2000);
            else { showTemporaryMessage("Error. Skipping..."); setTimeout(playNextSong, 2000); }
        }

        function loadTrack(i) {
            if (i >= 0 && i < playlist.length) { currentTrackIndex = i; player.loadVideoById(playlist[i].id); updateControlStates(); }
        }

        function getNextRandomIndex() {
            if (playlist.length <= 1) return 0;
            let ni; do { ni = Math.floor(Math.random() * playlist.length); } while (ni === currentTrackIndex); return ni;
        }

        function updateRepeatUI() { els.repeatBtn.classList.toggle('active', repeatMode !== 'none'); els.repeatBtn.innerHTML = repeatMode === 'one' ? SVG_ICONS.repeatOne : SVG_ICONS.repeatOff; }

        function updateControlStates() {
            const ht = currentTrackIndex !== -1 || isPlaylistMode;
            els.playPauseBtn.disabled = !ht; els.openVideoBtn.disabled = !ht;
            els.prevBtn.disabled = !ht && !isPlaylistMode; els.nextBtn.disabled = !ht && !isPlaylistMode;
        }

        function updateTrackInfo(vd) { if (vd && vd.title) { els.title.textContent = vd.title; els.artist.textContent = vd.author; } }

        function setAlbumArt(vid) { if (vid) els.albumArt.style.backgroundImage = `url(https://i.ytimg.com/vi/${vid}/maxresdefault.jpg)`; }

        function updatePlayPauseIcon(st) { els.playIcon.classList.toggle('hidden', st === YT.PlayerState.PLAYING); els.pauseIcon.classList.toggle('hidden', st !== YT.PlayerState.PLAYING); }

        function updateVolumeUI(v) {
            els.volumeFill.style.width = `${v}%`;
            let icon = SVG_ICONS.volumeHigh;
            if (v === 0 || (player.isMuted && player.isMuted())) icon = SVG_ICONS.volumeOff;
            else if (v < 33) icon = SVG_ICONS.volumeLow; else if (v < 66) icon = SVG_ICONS.volumeMedium;
            els.volumeBtn.innerHTML = icon;
        }

        function addTrackById(vid, p) { if (playlist.some(t => t.id === vid)) return; playlist.push({ id: vid }); if (p || currentTrackIndex === -1) loadTrack(playlist.length - 1); }

        function showTemporaryMessage(m) { const ot = els.title.textContent; els.title.textContent = m; setTimeout(() => { if (els.title.textContent === m) els.title.textContent = ot; }, 2000); }

        const getUrlParameter = (n) => { const r = new RegExp('[\\?&]' + n + '=([^&#]*)').exec(location.search); return r === null ? '' : decodeURIComponent(r[1].replace(/\+/g, ' ')); };

        els.playPauseBtn.onclick = () => player.getPlayerState() === 1 ? player.pauseVideo() : player.playVideo();
        els.nextBtn.onclick = playNextSong; els.prevBtn.onclick = playPrevSong;
        els.shuffleBtn.onclick = () => { isShuffle = !isShuffle; els.shuffleBtn.classList.toggle('active', isShuffle); };
        els.repeatBtn.onclick = toggleRepeat;
        els.volumeBtn.onclick = () => { if (player.isMuted()) { player.unMute(); player.setVolume(lastVolume); updateVolumeUI(lastVolume); } else { lastVolume = player.getVolume(); player.mute(); updateVolumeUI(0); } };
        els.openVideoBtn.onclick = () => { const id = player.getVideoData().video_id; if (id) window.open(`https://www.youtube.com/watch?v=${id}`, '_blank'); };

        els.volumeTrack.onmousedown = (e) => { isVolumeDragging = true; els.volumeGroup.classList.add('active'); handleVolDrag(e); };
        els.progressContainer.onmousedown = (e) => { isSeekDragging = true; handleSeek(e); };
        window.onmouseup = () => { isVolumeDragging = isSeekDragging = false; els.volumeGroup.classList.remove('active'); if(player && player.getPlayerState() === 1) startProgressUpdater(); };
        window.onmousemove = (e) => { if (isVolumeDragging) handleVolDrag(e); if (isSeekDragging) handleSeek(e); };

        function handleVolDrag(e) {
            const rect = els.volumeTrack.getBoundingClientRect();
            let p = ((e.clientX - rect.left) / rect.width) * 100;
            p = Math.max(0, Math.min(100, p));
            if (player && player.setVolume) { player.setVolume(p); updateVolumeUI(p); }
        }

        function handleSeek(e) {
            const rect = els.progressContainer.getBoundingClientRect();
            const p = (e.clientX - rect.left) / rect.width;
            els.progressBar.style.width = `${p * 100}%`; if (player && player.seekTo) player.seekTo(player.getDuration() * p);
        }
    </script>
</body>
</html>
