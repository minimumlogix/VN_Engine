<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src * 'self' 'unsafe-inline' 'unsafe-eval' data: gap: content: border-radius:; font-src * data:; style-src * 'unsafe-inline';">
    <title>YouTube Music Control Bar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        
        :root {
            --accent: #EF4444;
            --accent-glow: rgba(239, 68, 68, 0.5);
            --glass-bg: rgba(0, 0, 0, 0.1); /* Ultra transparent */
            --glass-border: rgba(255, 255, 255, 0.1);
            --transition-smooth: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        body { font-family: 'Inter', sans-serif; background: transparent; }
        .no-select { -webkit-user-select: none; -ms-user-select: none; user-select: none; }

        /* --- Core Layout & AAA Polish --- */
        #control-bar { 
            position: fixed;
            top: 0; /* Music bar on top */
            left: 0;
            width: 100%;
            height: 80px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px) saturate(150%);
            -webkit-backdrop-filter: blur(12px) saturate(150%);
            border-bottom: 1px solid var(--glass-border);
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.5rem;
            box-shadow: 0 4px 30px rgba(0,0,0,0.1);
            transition: var(--transition-smooth);
        }

        #album-art-bg { 
            position: absolute; 
            inset: 0; 
            background-size: cover; 
            background-position: center; 
            transition: background-image 1.2s ease-in-out; 
            filter: blur(40px) brightness(0.3); 
            transform: scale(1.1); 
            z-index: -1; 
            animation: atmosphericDrift 20s infinite alternate ease-in-out; 
        }
        @keyframes atmosphericDrift { 
            0% { transform: scale(1.1) translate(0, 0); } 
            100% { transform: scale(1.2) translate(-2%, -2%); } 
        }

        /* --- Credits --- */
        .credits-bar {
            position: absolute;
            bottom: 4px; /* Move to bottom of the bar */
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            pointer-events: none;
        }
        .credits-text {
            font-size: 8px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.4);
            pointer-events: auto;
            transition: var(--transition-smooth);
        }
        .credits-text:hover { color: rgba(255,255,255,0.9); }

        /* --- Progress Bar (Bottom of Bar) --- */
        .progress-bar-container { 
            position: absolute; 
            bottom: 0; /* Progress bar on the bottom */
            left: 0; 
            right: 0; 
            height: 3px; 
            background-color: rgba(255,255,255,0.1); 
            cursor: pointer; 
            transition: height 0.3s ease; 
        }
        .progress-bar-container:hover { height: 6px; }
        .progress-bar { 
            height: 100%; 
            background: linear-gradient(90deg, #F87171, #EF4444, #F43F5E); 
            transition: width 0.1s linear; 
            position: relative;
            box-shadow: 0 0 10px var(--accent-glow);
        }

        /* --- Controls & Buttons --- */
        .control-btn { 
            color: rgba(255,255,255,0.7); 
            transition: var(--transition-smooth); 
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .control-btn:hover:not(:disabled) { 
            color: #FFFFFF; 
            transform: scale(1.1);
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.3));
        }
        .control-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .control-btn.active { color: var(--accent); filter: drop-shadow(0 0 8px var(--accent-glow)); }

        .play-pause-btn {
            width: 48px;
            height: 48px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            transition: var(--transition-smooth);
        }
        .play-pause-btn:hover:not(:disabled) { background: rgba(255, 255, 255, 0.2); transform: scale(1.1); }

        /* --- Advanced Volume Popup --- */
        .volume-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .volume-popup {
            position: absolute;
            top: 50px; /* Below the icon since bar is at top */
            right: -10px;
            width: 40px;
            height: 140px;
            background: rgba(20, 20, 25, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px 0;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px) scale(0.9);
            transition: var(--transition-smooth);
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .volume-container:hover .volume-popup,
        .volume-container.active .volume-popup {
            opacity: 1;
            visibility: visible;
            transform: translateY(0) scale(1);
        }
        #volume-slider-track {
            width: 4px;
            height: 100px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            position: relative;
            cursor: pointer;
        }
        #volume-slider-fill {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fff;
            border-radius: 2px;
            transition: height 0.1s linear;
        }
        #volume-slider-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 12px;
            height: 12px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        /* --- Track Info --- */
        .track-info {
            display: flex;
            flex-direction: column;
            max-width: 250px;
        }
        #track-title { font-weight: 700; font-size: 0.95rem; color: #fff; }
        #track-artist { font-size: 0.8rem; color: rgba(255,255,255,0.5); }

        /* --- Responsiveness --- */
        @media (max-width: 640px) {
            #control-bar { padding: 0 1rem; }
            .track-info { display: none; } /* Hide track info on mobile to save space */
            .flex-1 { flex: none; }
            #control-bar { justify-content: space-around; }
        }
    </style>
</head>
<body class="no-select">

    <div id="control-bar">
        <div id="album-art-bg"></div>

        <!-- Credits Bar (Moved to bottom of bar) -->
        <div class="credits-bar">
            <a href="https://www.joyland.ai/profile/2xYazJ" target="_blank" rel="noopener noreferrer" class="credits-text">
                Music Player by 🅷🆄🅼🅰🅽
            </a>
        </div>

        <!-- Progress Bar (Bottom edge) -->
        <div id="progress-bar-container" class="progress-bar-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>

        <!-- Left: Track Info -->
        <div class="flex items-center gap-4 flex-1 min-w-0">
            <div class="track-info min-w-0">
                <p id="track-title" class="truncate">Loading Player...</p>
                <p id="track-artist" class="truncate">Please wait</p>
            </div>
        </div>

        <!-- Center: Controls -->
        <div class="flex items-center gap-6 justify-center flex-1">
            <button id="shuffle-btn" class="control-btn" title="Shuffle"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 3h5v5M4 21L21 4M21 16v5h-5M4 3l7 7"></path></svg></button>
            <button id="prev-btn" class="control-btn" title="Previous" disabled><svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M15.25 4.75a.75.75 0 00-1.5 0v10.5a.75.75 0 001.5 0V4.75zM11.873 4.41a.75.75 0 00-1.123.662v10.05c0 .542.604.889 1.123.662l-6.877-4.854a.75.75 0 000-1.324L11.873 4.41z"/></svg></button>
            
            <button id="play-pause-btn" class="play-pause-btn control-btn" title="Play" disabled>
                <span id="play-icon"><svg class="w-7 h-7" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd" /></svg></span>
                <span id="pause-icon" class="hidden"><svg class="w-7 h-7" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8 7a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1zm4 0a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" /></svg></span>
            </button>

            <button id="next-btn" class="control-btn" title="Next" disabled><svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M4.75 4.75a.75.75 0 00-1.5 0v10.5a.75.75 0 001.5 0V4.75zM8.127 4.41a.75.75 0 00-1.123.662v10.05c0 .542.604.889 1.123.662l6.877-4.854a.75.75 0 000-1.324L8.127 4.41z"/></svg></button>
            <button id="repeat-btn" class="control-btn" title="Repeat"></button>
        </div>

        <!-- Right: Volume & More -->
        <div class="flex items-center justify-end gap-6 flex-1">
            <button id="open-video-btn" class="control-btn sm:flex hidden" title="Open Video" disabled><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg></button>
            
            <div class="volume-container">
                <button id="volume-icon-btn" class="control-btn" title="Mute/Unmute"></button>
                <div class="volume-popup">
                    <div id="volume-slider-track">
                        <div id="volume-slider-fill"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="player"></div>

    <script>
        /* =========================================
           1. CONSTANTS & UI
           ========================================= */
        const FALLBACK_VIDEO_ID = 'OyFcQ909OYc';
        const SVG_ICONS = {
            volumeHigh: `<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M3 8h3l4-3v10l-4-3H3zM14 7a5 5 0 010 6M14 4a8 8 0 010 12"/></svg>`,
            volumeMedium: `<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M3 8h3l4-3v10l-4-3H3zM14 7a5 5 0 010 6"/></svg>`,
            volumeLow: `<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M3 8h3l4-3v10l-4-3H3z"/></svg>`,
            volumeOff: `<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M3 8h3l4-3v10l-4-3H3zM16 4l-2 2m0 0l-2 2m2-2l2 2m-2-2l-2-2"/></svg>`,
            repeatOff: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 2l4 4-4 4M3 11v-1a4 4 0 014-4h14M7 22l-4-4 4-4M21 13v1a4 4 0 01-4 4H3"></path></svg>`,
            repeatOne: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 2l4 4-4 4M3 11v-1a4 4 0 014-4h14M7 22l-4-4 4-4M21 13v1a4 4 0 01-4 4H3"></path><path d="M11.5 10.5h1V14h-1z" stroke-width="1" fill="currentColor"></path></svg>`
        };

        const els = {
            playPauseBtn: document.getElementById('play-pause-btn'),
            playIcon: document.getElementById('play-icon'),
            pauseIcon: document.getElementById('pause-icon'),
            nextBtn: document.getElementById('next-btn'),
            prevBtn: document.getElementById('prev-btn'),
            shuffleBtn: document.getElementById('shuffle-btn'),
            repeatBtn: document.getElementById('repeat-btn'),
            openVideoBtn: document.getElementById('open-video-btn'),
            progressBar: document.getElementById('progress-bar'),
            progressContainer: document.getElementById('progress-bar-container'),
            albumArt: document.getElementById('album-art-bg'),
            title: document.getElementById('track-title'),
            artist: document.getElementById('track-artist'),
            volumeBtn: document.getElementById('volume-icon-btn'),
            volumeTrack: document.getElementById('volume-slider-track'),
            volumeFill: document.getElementById('volume-slider-fill'),
            volumeContainer: document.querySelector('.volume-container')
        };
        
        els.volumeBtn.innerHTML = SVG_ICONS.volumeHigh;
        
        /* =========================================
           2. STATE
           ========================================= */
        let player;
        let playlist = [];
        let currentTrackIndex = -1;
        let isShuffle = false;
        let repeatMode = 'none';
        let progressInterval;
        let isVolumeDragging = false;
        let isSeekDragging = false; 
        let lastVolume = 100;
        let isPlaylistMode = false;

        /* =========================================
           3. API SETUP
           ========================================= */
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function onYouTubeIframeAPIReady() {
            const playlistIdParam = getUrlParameter('list');
            let initialVideoId = getUrlParameter('videoId');
            const playerVars = { 'autoplay': 1, 'controls': 0, 'disablekb': 1, 'modestbranding': 1, 'rel': 0 };

            if (playlistIdParam) {
                isPlaylistMode = true;
                playerVars.listType = 'playlist';
                playerVars.list = playlistIdParam;
            } else if (!initialVideoId) { initialVideoId = FALLBACK_VIDEO_ID; }

            player = new YT.Player('player', {
                height: '1', width: '1', playerVars: playerVars,
                events: { 'onReady': onPlayerReady, 'onStateChange': onPlayerStateChange, 'onError': onPlayerError }
            });
        }

        /* =========================================
           4. LOGIC
           ========================================= */
        function onPlayerStateChange(event) {
            updatePlayPauseIcon(event.data);
            if (event.data === YT.PlayerState.PLAYING) {
                const videoData = player.getVideoData();
                updateTrackInfo(videoData);
                setAlbumArt(videoData.video_id);
                startProgressUpdater();
            } else { stopProgressUpdater(); }
            if (event.data === YT.PlayerState.ENDED && repeatMode !== 'one' && !isPlaylistMode) playNextSong();
        }

        const startProgressUpdater = () => {
            stopProgressUpdater();
            progressInterval = setInterval(() => {
                if (player && player.getCurrentTime) {
                    const ct = player.getCurrentTime(), dur = player.getDuration();
                    if (repeatMode === 'one' && dur > 0 && ct >= (dur - 0.5)) { player.seekTo(0); return; }
                    if (dur > 0) els.progressBar.style.width = `${(ct / dur) * 100}%`;
                }
            }, 100); 
        };
        const stopProgressUpdater = () => clearInterval(progressInterval);

        function toggleRepeat() {
            if (repeatMode === 'none') repeatMode = 'all';
            else if (repeatMode === 'all') repeatMode = 'one';
            else repeatMode = 'none';
            if (isPlaylistMode && player && player.setLoop) player.setLoop(repeatMode === 'all');
            updateRepeatUI();
        }

        function playNextSong() {
            if (!player) return;
            if (isPlaylistMode) { player.nextVideo(); return; }
            let nextIndex = isShuffle ? getNextRandomIndex() : currentTrackIndex + 1;
            if (nextIndex >= playlist.length) {
                if (repeatMode === 'all') nextIndex = 0; else { player.stopVideo(); return; }
            }
            loadTrack(nextIndex);
        }

        function playPrevSong() {
            if (!player) return;
            if (isPlaylistMode) { player.previousVideo(); return; }
            if (player.getCurrentTime() > 3) { player.seekTo(0); return; }
            let prevIndex = currentTrackIndex - 1;
            if (prevIndex < 0) prevIndex = playlist.length - 1;
            loadTrack(prevIndex);
        }

        function onPlayerReady(event) {
            if (!isPlaylistMode) addTrackById(getUrlParameter('videoId') || FALLBACK_VIDEO_ID, false);
            updateVolumeUI(player.getVolume());
            updateRepeatUI();
            updateControlStates();
        }

        function onPlayerError(event) {
            if (isPlaylistMode) setTimeout(() => player.nextVideo(), 2000);
            else { showTemporaryMessage("Error. Skipping..."); setTimeout(playNextSong, 2000); }
        }

        function loadTrack(index) {
            if (index >= 0 && index < playlist.length) {
                currentTrackIndex = index;
                player.loadVideoById(playlist[currentTrackIndex].id);
                updateControlStates();
            }
        }

        function getNextRandomIndex() {
            if (playlist.length <= 1) return 0;
            let ni; do { ni = Math.floor(Math.random() * playlist.length); } while (ni === currentTrackIndex);
            return ni;
        }

        function updateRepeatUI() {
            els.repeatBtn.classList.toggle('active', repeatMode !== 'none');
            els.repeatBtn.innerHTML = repeatMode === 'one' ? SVG_ICONS.repeatOne : SVG_ICONS.repeatOff;
        }

        function updateControlStates() {
            const ht = currentTrackIndex !== -1 || isPlaylistMode;
            els.playPauseBtn.disabled = !ht; els.openVideoBtn.disabled = !ht;
            els.prevBtn.disabled = !ht && !isPlaylistMode; els.nextBtn.disabled = !ht && !isPlaylistMode;
        }

        function updateTrackInfo(vd) {
            if (vd && vd.title) { els.title.textContent = vd.title; els.artist.textContent = vd.author; }
        }

        function setAlbumArt(vid) {
            if (vid) els.albumArt.style.backgroundImage = `url(https://i.ytimg.com/vi/${vid}/maxresdefault.jpg)`;
        }

        function updatePlayPauseIcon(st) {
            els.playIcon.classList.toggle('hidden', st === YT.PlayerState.PLAYING);
            els.pauseIcon.classList.toggle('hidden', st !== YT.PlayerState.PLAYING);
        }

        function updateVolumeUI(v) {
            els.volumeFill.style.height = `${v}%`;
            let icon = SVG_ICONS.volumeHigh;
            if (v === 0 || (player.isMuted && player.isMuted())) icon = SVG_ICONS.volumeOff;
            else if (v < 33) icon = SVG_ICONS.volumeLow;
            else if (v < 66) icon = SVG_ICONS.volumeMedium;
            els.volumeBtn.innerHTML = icon;
        }

        function addTrackById(vid, p) {
            if (playlist.some(t => t.id === vid)) return;
            playlist.push({ id: vid });
            if (p || currentTrackIndex === -1) loadTrack(playlist.length - 1);
        }

        function showTemporaryMessage(m) {
            const ot = els.title.textContent; els.title.textContent = m;
            setTimeout(() => { if (els.title.textContent === m) els.title.textContent = ot; }, 2000);
        }

        const getUrlParameter = (n) => {
            const r = new RegExp('[\\?&]' + n + '=([^&#]*)').exec(location.search);
            return r === null ? '' : decodeURIComponent(r[1].replace(/\+/g, ' '));
        };

        // --- Listeners ---
        els.playPauseBtn.onclick = () => player.getPlayerState() === 1 ? player.pauseVideo() : player.playVideo();
        els.nextBtn.onclick = playNextSong;
        els.prevBtn.onclick = playPrevSong;
        els.shuffleBtn.onclick = () => { isShuffle = !isShuffle; els.shuffleBtn.classList.toggle('active', isShuffle); };
        els.repeatBtn.onclick = toggleRepeat;
        els.volumeBtn.onclick = () => {
            if (player.isMuted()) { player.unMute(); player.setVolume(lastVolume); updateVolumeUI(lastVolume); }
            else { lastVolume = player.getVolume(); player.mute(); updateVolumeUI(0); }
        };
        els.openVideoBtn.onclick = () => {
            const id = player.getVideoData().video_id;
            if (id) window.open(`https://www.youtube.com/watch?v=${id}`, '_blank');
        };

        // --- Dragging ---
        els.volumeTrack.onmousedown = (e) => { isVolumeDragging = true; handleVolDrag(e); };
        els.progressContainer.onmousedown = (e) => { isSeekDragging = true; handleSeek(e); };
        window.onmouseup = () => { isVolumeDragging = isSeekDragging = false; if(player && player.getPlayerState() === 1) startProgressUpdater(); };
        window.onmousemove = (e) => { if (isVolumeDragging) handleVolDrag(e); if (isSeekDragging) handleSeek(e); };

        function handleVolDrag(e) {
            const rect = els.volumeTrack.getBoundingClientRect();
            let p = 100 - (((e.clientY - rect.top) / rect.height) * 100);
            p = Math.max(0, Math.min(100, p));
            if (player && player.setVolume) { player.setVolume(p); updateVolumeUI(p); }
        }

        function handleSeek(e) {
            const rect = els.progressContainer.getBoundingClientRect();
            const p = (e.clientX - rect.left) / rect.width;
            els.progressBar.style.width = `${p * 100}%`;
            if (player && player.seekTo) player.seekTo(player.getDuration() * p);
        }
    </script>
</body>
</html>
